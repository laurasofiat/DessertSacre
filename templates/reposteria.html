<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panadería Dessert Sacré</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/style.css') }}"
      href="{{url('static', filename='styles/reposteria.css')}}"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    {% include 'navbar.html' %}

    <!-- REPOSTERÍA -->
    <div class="section-title">
      <h2>Repostería</h2>
      <p>Deliciosos postres para endulzar tu día.</p>
    </div>

    <div class="container my-4">
      <div
        id="carouselReposteria"
        class="carousel slide"
        data-bs-ride="carousel"
      >
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="{{ url_for('static', filename='img/reposteria1.jpeg') }}"
              alt="Galleta Red Velvet"
            />
            <div class="carousel-caption d-none d-md-block">
              <h5>Galleta Red Velvet</h5>
            </div>
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='img/reposteria2.jpeg') }}"
              alt="Alfajores"
            />
            <div class="carousel-caption d-none d-md-block">
              <h5>Alfajores</h5>
            </div>
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='img/reposteria3.jpeg') }}"
              alt="Bollos de canela"
            />
            <div class="carousel-caption d-none d-md-block">
              <h5>Bollos de canela</h5>
            </div>
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselReposteria"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselReposteria"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </div>
  </body>
</html>
