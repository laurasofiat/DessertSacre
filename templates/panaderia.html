<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panadería Dessert Sacré</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles/style.css" />
    <link rel="stylesheet" href="/static/styles/panaderia.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    {% include 'navbar.html' %}

    <div class="Textoinicio text-center my-4">
      <h2>Panadería</h2>
      <p>Descubre nuestra selección de panes y bollería.</p>
    </div>

    <div class="container my-4">
      <div
        id="carouselPanaderia"
        class="carousel slide"
        data-bs-ride="carousel"
      >
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="/static/img/panaderia1.jpeg"
              class="d-block w-100"
              alt="Croissants"
            />
            <div
              class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded"
            >
              <h5>Pan Cacho</h5>
            </div>
          </div>
          <div class="carousel-item">
            <img
              src="/static/img/panaderia2.jpeg"
              class="d-block w-100"
              alt="Pan Cacho"
            />
            <div
              class="carousel-caption d-none d-md-block bg-dark bg-sopacity-50 rounded"
            >
              <h5>Pan Aliañdo</h5>
            </div>
          </div>
          <div class="carousel-item">
            <img
              src="/static/img/panaderia3.jpeg"
              class="d-block w-100"
              alt="pan aliñado"
            />
            <div
              class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded"
            >
              <h5>Pan pollo</h5>
            </div>
          </div>
        </div>

        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselPanaderia"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselPanaderia"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </div>
  </body>
</html>
