<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panadería Dessert Sacré</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/style.css') }}"
      href="{{ url_for('static', filename='styles/pasteleria.css') }}"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    {% include 'navbar.html' %}

    <!-- PASTELERÍA -->
    <div class="section-title">
      <h2>Pastelería</h2>
      <p>Tartas, pasteles y delicias artesanales.</p>
    </div>

    <div class="container my-4">
      <div
        id="carouselPasteleria"
        class="carousel slide"
        data-bs-ride="carousel"
      >
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="{{ url_for('static', filename='img/pasteleria1.jpeg') }}"
              alt="Red velvet"
            />
            <div class="carousel-caption d-none d-md-block">
              <h5>Red Velvet</h5>
            </div>
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='img/pasteleria2.jpeg') }}"
              alt="Pastel de Chocolate"
            />
            <div class="carousel-caption d-none d-md-block">
              <h5>Pastel de Chocolate</h5>
            </div>
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='img/pasteleria3.jpeg') }}"
              alt="Cheesecake"
            />
            <div class="carousel-caption d-none d-md-block">
              <h5>Pastel de arequipe</h5>
            </div>
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselPasteleria"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselPasteleria"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </div>
  </body>
</html>
