<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/styles/style.css">
</head>

<body class="Bespa" data-bs-spy="scroll" data-bs-target="#navbar-example2" data-bs-offset="90" tabindex="0">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <nav id="navbar-example2" class="navbar navbar-expand-lg fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="#"> 
      <img class="logo-navbar" src="/static/img/LOGO1.png" alt="Logo"> 
      <span class="ms-2">Dessert Sacré</span> 
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a>
        </li>

        <p class="d-none d-lg-block">ㅤㅤ</p> 

        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="{{ url_for('menu') }}"
            role="button" aria-expanded="false">Menú</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="{{ url_for('panaderia') }}">Panadería</a></li>
            <li><a class="dropdown-item" href="{{ url_for('pasteleria') }}">Pastelería</a></li>
            <li><a class="dropdown-item" href="{{ url_for('reposteria') }}">Repostería</a></li>
            <li><a class="dropdown-item" href="{{ url_for('bebidas') }}">Bebidas</a></li>
          </ul>
        </li>

        <p class="d-none d-lg-block">ㅤㅤ</p>

        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="{{ url_for('sobrenosotros') }}"
            role="button" aria-expanded="false">Sobre Nosotros</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="{{ url_for('sobrenosotros') }}#Historia">Historia</a></li>
            <li><a class="dropdown-item" href="{{ url_for('sobrenosotros') }}#Equipo">Equipo</a></li>
          </ul>
        </li>

        <p class="d-none d-lg-block">ㅤㅤ</p>

        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('redes') }}">Contáctanos</a>
        </li>

        <p class="d-none d-lg-block">ㅤㅤ</p>
        
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('carrito') }}">Carrito<span id="cart-count" class="badge bg-danger">0</span></a>
        </li>
      </ul>
    </div> 
  </div> 
</nav>

  <script>
    document.querySelectorAll('.nav-item.dropdown > a.nav-link').forEach(link => {
      link.addEventListener('click', function (e) {
        if (!this.classList.contains('show')) {
          // Si el menú no está desplegado, navegar a la ruta
          window.location = this.getAttribute('href');
        }
      });
    });
  </script>

  <style>

    /* Solo en pantallas donde el usuario tiene mouse (evita problemas en celular/tablet) */
  @media (hover: hover) and (pointer: fine) {
    .nav-item.dropdown:hover .dropdown-menu {
      display: block;
      margin-top: 0; /* quita el espacio que deja Bootstrap por defecto */
    }
  }

  @media (hover: hover) and (pointer: fine) {
    .nav-item.dropdown:hover .dropdown-toggle::after {
      transform: rotate(180deg);
      transition: transform 0.2s ease;
    }
  }

  </style>

</body>

</html>
