<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/styles/redes.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="menuN" data-bs-spy="scroll" data-bs-target="#navbar-example2" data-bs-offset="90" tabindex="0"
data-usuario="{{ 'true' if 'usuario' in session else 'false' }}">

{% include 'navbar.html' %}

    <div class="hero-responsive">
                <img src="/static/img/fondo2.jpeg" alt="Panaderia" class="hero-img">
            <div class="hero-title-overlay">
                <span>CONTÁCTANOS</span>
            </div>
    </div>

    <section class="contact-section">

        <div class="contact-container">

            <!-- Información de contacto -->
            <div class="contact-info">
                <h3>Dessert Sacré</h3>
                <p><strong>📍 Dirección:</strong> Ubicación del cliente</p>
                <p><strong>📞 Teléfono:</strong> +57 310 3885820</p>
                <p><strong>📧 Correo:</strong> dessertsacre@gmail.com</p>
                <p><strong>🕒 Horario:</strong> Disponibilidad del cliente</p>

                <!-- Mapa -->
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3976.589831710085!2d-74.0560485852378!3d4.666991396614131!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e3f9a5f3d3a4b9d%3A0x7a3c3c7e3f8a4176!2sParque%2093!5e0!3m2!1ses!2sco!4v1678888888888!5m2!1ses!2sco" loading="lazy" allowfullscreen="">
                </iframe>
            </div>

            <!-- Formulario -->
            <div class="contact-form">
                <h3>Envíanos un mensaje</h3>
                <form id="contactForm">
                    <input type="text" id="name" placeholder="Primer Nombre" required="">
                    <input type="text" id="apellido" placeholder="Primer Apellido" required="">
                    <input type="email" id="email" placeholder="Correo Electrónico" required="">
                    <textarea id="message" placeholder="Escribe tu mensaje aquí..." required=""></textarea>
                    <button type="submit">Enviar mensaje</button>

                    <div class="success-message" id="successMessage">
                        ¡Gracias! Tu mensaje fue enviado correctamente 🧁
                    </div>
                </form>
            </div>

        </div>

    </section>

    {% include 'footer.html' %}

    <!-- Enlace al JavaScript -->
    <script>
    const usuarioLogueado = "{{ 'true' if 'usuario' in session else 'false' }}" === "true";
    
    document.addEventListener("DOMContentLoaded", function () {

        const form = document.getElementById("contactForm");

        function mostrarMensaje(texto, tipo = "danger") {

            const viejo = document.getElementById("mensaje-form");
            const fondoViejo = document.getElementById("fondo-form");
            if (viejo) viejo.remove();
            if (fondoViejo) fondoViejo.remove();

            const fondo = document.createElement("div");
            fondo.id = "fondo-form";
            fondo.style.cssText = `
                position:fixed;
                top:0;
                left:0;
                width:100%;
                height:100%;
                background:rgba(0, 0, 0, 0.5);
                z-index:9998;
            `;

            const caja = document.createElement("div");
            caja.id = "mensaje-form";
            caja.style.cssText = `
                position:fixed;
                top:50%;
                left:50%;
                transform:translate(-50%,-50%);
                z-index:9999;
                width:90%;
                max-width:400px;
            `;

            caja.innerHTML = `
                <div class="alert alert-${tipo} text-center shadow">
                    ${texto}
                    <br><br>
                    <button class="btn btn-dark btn-sm">Cerrar</button>
                </div>
            `;

            document.body.appendChild(fondo);
            document.body.appendChild(caja);

            caja.querySelector("button").onclick = () => {
                caja.remove();
                fondo.remove();
            };

            fondo.onclick = () => {
                caja.remove();
                fondo.remove();
            };
        }

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            //  VALIDACIÓN DE SESIÓN
            if (!usuarioLogueado) {
                mostrarMensaje("No puedes enviar mensajes. Debes iniciar sesión o registrarte primero.", "danger");
                return;
            }

            // SI SÍ ESTÁ LOGUEADO
            mostrarMensaje("¡Mensaje enviado correctamente 🧁!", "success");
            form.reset();
        });

    });
    </script>


</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</html>
