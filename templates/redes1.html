<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/styles/redes.css">
</head>
<body>

{% include 'navbar1.html' %}

    <div class="hero-responsive">
                <img src="static/img/fondo2.jpeg" alt="Panaderia" class="hero-img">
            <div class="hero-title-overlay">
                <span>CONTÁCTANOS</span>
            </div>
    </div>

    <a href="https://wa.me/573025662571?text=Hola,%20quiero%20hacer%20un%20pedido" 
        class="whatsapp-float" 
        target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

    <section class="contact-section">

        <div class="contact-container">

            <!-- Información de contacto -->
            <div class="contact-info">
                <h3>Dessert Sacré</h3>
                <p><strong> Dirección:</strong> Ubicación del cliente </p>
                <p><strong> Teléfono:</strong> +57 302 566 2571</p>
                <p><strong>Correo:</strong> dessertsacre@gmail.com</p>
                <p><strong> Horario:</strong> Disponibilidad del cliente</p>

                <!-- Mapa -->
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3976.589831710085!2d-74.0560485852378!3d4.666991396614131!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e3f9a5f3d3a4b9d%3A0x7a3c3c7e3f8a4176!2sParque%2093!5e0!3m2!1ses!2sco!4v1678888888888!5m2!1ses!2sco" loading="lazy" allowfullscreen="">
                </iframe>
            </div>

            <!-- Formulario -->
            <div class="contact-form">
                <h3>Envíanos un mensaje</h3>
                <form id="contactForm">
                    <input type="text" id="name" placeholder="Primer Nombre" required="">
                    <input type="text" id="name" placeholder="Primer Apellido" required="">
                    <input type="email" id="email" placeholder="Correo Electrónico" required="">
                    <textarea id="message" placeholder="Escribe tu mensaje aquí..." required=""></textarea>
                    <button type="submit">Enviar mensaje</button>

                    <div class="success-message" id="successMessage">
                        ¡Gracias por contáctarnos! Tu mensaje se revisará más tarde. 
                    </div>
                </form>
            </div>

        </div>

    </section>

    {% include 'footer1.html' %}

    <!-- Enlace al JavaScript -->
    <script>
        // Espera a que el DOM cargue completamente
    document.addEventListener("DOMContentLoaded", function () {

        const form = document.getElementById("contactForm");
        const successMessage = document.getElementById("successMessage");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const message = document.getElementById("message").value.trim();

            // Validar campos vacíos
            if (name === "" || email === "" || message === "") {
                alert("Por favor completa todos los campos.");
                return;
            }

            // Validar formato de correo electrónico
            const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,}$/i;
            if (!email.match(emailPattern)) {
                alert("Por favor ingresa un correo electrónico válido.");
            return;
            }

            const destinatario = "dessertsacre@gmail.com";

            /* Asunto del correo con el nombre del cliente */
            const asunto = encodeURIComponent(`Mensaje de ${name}`);
            /* encodeURIComponent convierte espacios y caracteres especiales para la URL */

            /* Cuerpo del correo con todos los datos */
            const cuerpo = encodeURIComponent(
                `Nombre: ${name} \nCorreo: ${email}\n\nMensaje:\n${message}`
            );

            /* Construye el enlace de Gmail con todo prellenado */
            const gmailURL = `https://mail.google.com/mail/?view=cm&to=${destinatario}&su=${asunto}&body=${cuerpo}`;

            /* Abre Gmail en una pestaña nueva */
            window.open(gmailURL, "_blank");

            // Mostrar mensaje de éxito
            successMessage.style.display = "block";

            // Limpiar formulario
            form.reset();

            // Ocultar mensaje después de 1 minuto
            setTimeout(() => {
            successMessage.style.display = "none";
            }, 120000);
        });

    });
    </script>


</body>

</html>
