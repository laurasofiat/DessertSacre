<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dessert Sacré | Registro</title>
    <link rel="stylesheet" href="/static/styles/style.css">
    <link rel="stylesheet" href="/static/styles/register.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="body">

{% include 'navbar.html' %}

<!-- FORMULARIO DE REGISTRO -->
<div class="form1">
    <h2>Crear Cuenta</h2>
    <h3>¡Únete a nosotros y disfruta de los mejores postres!</h3>

    <form action="/guardar" method="POST">
        <input type="text" name="primer_nombre" placeholder="Primer Nombre" required />
        <input type="text" name="segundo_nombre" placeholder="Segundo Nombre" />
        <input type="text" name="primer_apellido" placeholder="Primer Apellido" required />
        <input type="text" name="segundo_apellido" placeholder="Segundo Apellido" />
        <input type="email" name="correo" placeholder="Correo" required />
        <input type="password" name="password" placeholder="Contraseña" required />
        <input type="text" name="telefono" placeholder="Teléfono" required />
        <input type="text" name="direccion" placeholder="Dirección" required />
        <button type="submit">Registrarse</button>
    </form>

    <a href="/login" class="link">¿Ya tienes cuenta? Inicia sesión</a>
</div>

<!-- TOASTS -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    {% with messages = get_flashed_messages(with_categories=True) %}
    {% for category, message in messages %}
    <div class="toast align-items-center text-white bg-{{
        'danger' if category == 'danger' else
        'warning' if category == 'warning' else
        'success'
    }} border-0 mb-2">
        <div class="d-flex">
            <div class="toast-body">{{ message }}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
    {% endfor %}
    {% endwith %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".toast").forEach(t => new bootstrap.Toast(t).show());
});
</script>

</body>
</html>
